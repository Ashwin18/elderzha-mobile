name: elderzha
description: ElderZha - Senior Citizen Wellness App
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  smooth_page_indicator: ^1.1.0
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  timeline_tile: ^2.0.0
  font_awesome_flutter: ^10.5.0
  flutter_html: ^3.0.0
  video_player: ^2.8.2
  youtube_player_flutter: ^9.1.3

  # State & Navigation
  provider: ^6.1.2

  # HTTP & Storage
  dio: ^5.9.0
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5

  # Calendar & Date
  table_calendar: ^3.1.2
  intl: ^0.19.0
  timezone: ^0.10.1
  timeago: ^3.7.1

  # Firebase & Notifications
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^19.5.0

  # Alarms (original native system)
  android_alarm_manager_plus: ^4.0.7
  flutter_alarm_clock: ^0.1.2
  android_intent_plus: ^6.0.0
  permission_handler: ^11.0.1

  # Network
  connectivity_plus: ^7.0.0

  # Payment
  razorpay_flutter: ^1.4.1

  # File & Media
  image_picker: ^1.0.2
  file_picker: ^10.3.3

  # Misc
  fluttertoast: ^8.2.4
  url_launcher: ^6.3.2
  pdf: ^3.11.3
  printing: ^5.14.2
  pinput: 5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

dependency_overrides:
  web: ^1.0.0
  http: ^1.2.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
